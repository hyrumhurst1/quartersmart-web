  to = "/services"
  status = 301
[[redirects]]
  from = "/n8n-automation/*"
  to = "/services"
  status = 301
[[redirects]]
  from = "/workforce-enablement/*"
  to = "/services"
  status = 301
[[redirects]]
  from = "/radar.html"
  to = "/signals"
  status = 301
[[redirects]]

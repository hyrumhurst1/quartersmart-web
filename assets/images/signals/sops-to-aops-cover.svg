<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320" role="img" aria-label="An SOP document on the left transforming into an AOP agent procedure with decision branches on the right">
  <rect width="800" height="320" fill="#060608"/>
  <!-- SOP document (human steps) -->
  <g transform="translate(70,70)">
    <rect x="0" y="0" width="200" height="180" rx="12" fill="#0c1016" stroke="#1b2230" stroke-width="1.5"/>
    <text x="20" y="34" font-family="ui-monospace, monospace" font-size="15" letter-spacing="2" fill="#8b95a5">SOP</text>
    <line x1="20" y1="60" x2="180" y2="60" stroke="#39414e" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="84" x2="150" y2="84" stroke="#39414e" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="108" x2="172" y2="108" stroke="#39414e" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="132" x2="130" y2="132" stroke="#39414e" stroke-width="6" stroke-linecap="round"/>
    <text x="20" y="166" font-family="ui-monospace, monospace" font-size="11" fill="#5b6675">written for humans</text>
  </g>
  <!-- arrow -->
  <g transform="translate(300,160)">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#00e5a0" stroke-width="3"/>
    <path d="M120 -8 L138 0 L120 8 Z" fill="#00e5a0"/>
  </g>
  <!-- AOP agent procedure (nodes + decision branch) -->
  <g transform="translate(470,70)">
    <rect x="0" y="0" width="260" height="180" rx="12" fill="#0c1016" stroke="rgba(0,229,160,0.32)" stroke-width="1.5"/>
    <text x="20" y="34" font-family="ui-monospace, monospace" font-size="15" letter-spacing="2" fill="#00e5a0">AOP</text>
    <!-- flow -->
    <line x1="44" y1="74" x2="92" y2="74" stroke="#00e5a0" stroke-width="2.5"/>
    <line x1="116" y1="74" x2="150" y2="56" stroke="#00e5a0" stroke-width="2.5"/>
    <line x1="116" y1="74" x2="150" y2="92" stroke="#00e5a0" stroke-width="2.5"/>
    <line x1="174" y1="56" x2="214" y2="56" stroke="#1ffdb3" stroke-width="2.5"/>
    <line x1="174" y1="92" x2="214" y2="92" stroke="#1ffdb3" stroke-width="2.5"/>
    <circle cx="36" cy="74" r="9" fill="#060608" stroke="#00e5a0" stroke-width="2.5"/>
    <rect x="94" y="62" width="24" height="24" rx="5" fill="#060608" stroke="#00e5a0" stroke-width="2.5" transform="rotate(45 106 74)"/>
    <circle cx="224" cy="56" r="9" fill="#1ffdb3"/>
    <circle cx="224" cy="92" r="9" fill="#1ffdb3"/>
    <text x="20" y="166" font-family="ui-monospace, monospace" font-size="11" fill="#00e5a0">run by an AI agent</text>
  </g>
</svg>
